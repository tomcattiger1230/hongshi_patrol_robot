# Robot320 Nav2 baseline for ROS 2 Jazzy.
#
# The footprint assumes base_link is at the geometric center of the 1.54 x
# 0.87 m chassis. Keep Nav2 disabled until this assumption and /odom are
# verified on the robot.

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    costmap_update_timeout: 0.30
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.30
      movement_time_allowance: 20.0
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.20
      # A car-like chassis cannot rotate in place; keep the first-pass yaw
      # tolerance wider than the differential-drive Nav2 default.
      yaw_goal_tolerance: 0.20
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      vx_std: 0.12
      vy_std: 0.0
      wz_std: 0.08
      vx_max: 0.50
      vx_min: 0.00
      vy_max: 0.0
      wz_max: 0.22
      ax_max: 0.30
      ax_min: -0.50
      ay_max: 0.0
      ay_min: 0.0
      az_max: 0.25
      iteration_count: 1
      prune_distance: 2.5
      transform_tolerance: 0.2
      temperature: 0.3
      gamma: 0.015
      motion_model: "Ackermann"
      visualize: false
      regenerate_noises: true
      AckermannConstraints:
        min_turning_r: 2.35
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      critics:
        - ConstraintCritic
        - CostCritic
        - GoalCritic
        - GoalAngleCritic
        - PathAlignCritic
        - PathFollowCritic
        - PathAngleCritic
        - PreferForwardCritic
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: true
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 2
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        threshold_to_consider: 0.5

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 8.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 8
      height: 8
      resolution: 0.05
      footprint: "[[0.77, 0.435], [0.77, -0.435], [-0.77, -0.435], [-0.77, 0.435]]"
      footprint_padding: 0.05
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        footprint_clearing_enabled: true
        publish_voxel_map: false
        origin_z: 0.0
        z_resolution: 0.10
        z_voxels: 16
        min_obstacle_height: 0.05
        max_obstacle_height: 1.60
        mark_threshold: 0
        observation_sources: points
        points:
          topic: /filtered_points
          data_type: "PointCloud2"
          transport_type: "raw"
          clearing: true
          marking: true
          obstacle_min_range: 0.30
          obstacle_max_range: 8.0
          raytrace_min_range: 0.30
          raytrace_max_range: 10.0
          min_obstacle_height: 0.05
          max_obstacle_height: 1.60
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.65
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      track_unknown_space: true
      footprint: "[[0.77, 0.435], [0.77, -0.435], [-0.77, -0.435], [-0.77, 0.435]]"
      footprint_padding: 0.05
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: points
        points:
          topic: /filtered_points
          data_type: "PointCloud2"
          transport_type: "raw"
          clearing: true
          marking: true
          obstacle_min_range: 0.30
          obstacle_max_range: 8.0
          raytrace_min_range: 0.30
          raytrace_max_range: 10.0
          min_obstacle_height: 0.05
          max_obstacle_height: 1.60
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.65
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 2.0
    costmap_update_timeout: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      tolerance: 0.20
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 3.0
      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 12.0
      analytic_expansion_max_cost: 200.0
      minimum_turning_radius: 2.35
      reverse_penalty: 2.0
      change_penalty: 0.0
      non_straight_penalty: 1.20
      cost_penalty: 2.0
      retrospective_penalty: 0.015
      lookup_table_size: 12.0
      cache_obstacle_heuristic: false
      smooth_path: true

smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    # Spin is retained so the default BT can load, but zero-linear-speed turn
    # commands are rejected by the chassis bridge and therefore fail safely.
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.22
    min_rotational_vel: 0.05
    rotational_acc_lim: 0.25

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: true
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: true
    feedback: "OPEN_LOOP"
    max_velocity: [0.50, 0.0, 0.22]
    min_velocity: [0.00, 0.0, -0.22]
    max_accel: [0.30, 0.0, 0.13]
    max_decel: [-0.50, 0.0, -0.22]
    odom_topic: /odom
    odom_duration: 0.1
    deadband_velocity: [0.02, 0.0, 0.01]
    velocity_timeout: 0.5
