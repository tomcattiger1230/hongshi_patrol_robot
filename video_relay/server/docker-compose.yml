services:
  mediamtx:
    image: bluenviron/mediamtx:1
    container_name: robot-video-relay
    restart: unless-stopped
    ports:
      - "8554:8554/tcp"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    environment:
      MTX_AUTHINTERNALUSERS_0_USER: "${PUBLISH_USER:?请在 server/.env 中设置 PUBLISH_USER}"
      MTX_AUTHINTERNALUSERS_0_PASS: "${PUBLISH_PASSWORD:?请在 server/.env 中设置 PUBLISH_PASSWORD}"
      MTX_AUTHINTERNALUSERS_0_PERMISSIONS_0_ACTION: publish
      MTX_AUTHINTERNALUSERS_0_PERMISSIONS_0_PATH: robot
      MTX_AUTHINTERNALUSERS_1_USER: "${READ_USER:?请在 server/.env 中设置 READ_USER}"
      MTX_AUTHINTERNALUSERS_1_PASS: "${READ_PASSWORD:?请在 server/.env 中设置 READ_PASSWORD}"
      MTX_AUTHINTERNALUSERS_1_PERMISSIONS_0_ACTION: read
      MTX_AUTHINTERNALUSERS_1_PERMISSIONS_0_PATH: robot
